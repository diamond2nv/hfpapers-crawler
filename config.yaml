# ─────────────────────────────────────────
# HF Papers Collector — Config-driven crawler system
# Main config: config.yaml
# Secrets:     .env
# ─────────────────────────────────────────

# ===== 1. Site Resources & Crawl Rules =====
search:
  # Built-in site config
  sources:
    huggingface:
      engine: "hf_cli"          # hf_cli | requests | browser
      command: "hf papers search '{query}' --json --limit {limit}"
      max_pages: 3
      delay_sec: 1.0
      enable: true
    arxiv:
      api_base: "https://export.arxiv.org/api/query"
      search_prefix: "http://export.arxiv.org/api/query?search_query="
      delay_sec: 3.0
      results_per_query: 50
      enable: false              # Fallback
    openreview:
      api_base: "https://api.openreview.net"
      max_results: 30
      enable: true               # Review records + papers
      notes: "Includes reviewer ratings and comments"
    pwc:
      api_base: "https://paperswithcode.com/api/v1"
      max_results: 30
      enable: true               # Code repos + SOTA rankings
      notes: "Includes official code repository links"

  # Enabled search sources (ordered by priority)
  enabled:
    - "hf_cli"
    - "pwc_api"
    - "openreview"
    # - "arxiv_api"  # Fallback, disabled by default

  # Search dimensions
  max_per_dim: 30               # Max results per dimension (after multi-source dedup)
  queries:
    - query: "PDE neural operator"
      category: neural-operator
      weight: 2
    - query: "physics-informed neural network"
      category: pinn
      weight: 1
    - query: "physical constraint residual loss PDE"
      category: pinn
      weight: 1
    - query: "AI 4 Science neural surrogate"
      category: foundation-model
      weight: 1
    - query: "neural operator physics informed"
      category: neural-operator
      weight: 2
    - query: "PDE solution operators"
      category: foundation-model
      weight: 1
    - query: "flow matching physical constraints"
      category: pinn
      weight: 1
    - query: "neural PDE solver"
      category: neural-operator
      weight: 2

# ===== 2. Keyword Whitelist / Blacklist =====
keywords:
  # Whitelist — hit adds score
  include_high:
    - "neural operator"
    - "fourier neural operator"
    - "deeponet"
    - "pino"
    - "physics-informed"
    - "pinn"
    - "partial differential equation"
    - "flow matching"
    - "operator learning"
    - "conservation law"
    - "physical constraint"
    - "surrogate model"
    - "pde solver"
    - "foundation model"
    - "function space"

  include_medium:
    - "simulation"
    - "cfd"
    - "fluid"
    - "navier-stokes"
    - "burgers"
    - "turbulence"
    - "multiscale"
    - "mesh"
    - "discretization-invariant"

  include_low:
    - "weather"
    - "climate"
    - "aerospace"
    - "materials"
    - "molecular"
    - "magnetohydrodynamic"

  # Blacklist — hit skips
  exclude:
    - "quantum"
    - "qml"
    - "qubit"
    - "string theory"
    - "photonic"
    - "image generation"
    - "image synthesis"
    - "super resolution image"
    - "llm fine-tuning"
    - "reinforcement learning"
    - "recommender system"
    - "nlp"
    - "machine translation"
    - "object detection"
    - "segmentation"
    - "pose estimation"

# ===== 3. Anti-Crawl Strategy =====
anti_crawl:
  random_ua: true                # Random User-Agent
  random_delay:
    base: 2.0                    # Base delay (seconds)
    jitter: 0.5                  # Random jitter ±50%
  max_retries: 3                 # Max retries
  retry_delay_base: 30           # Exponential backoff base (seconds)
  retry_http_codes: [429, 503, 403, 408, 500, 502, 520]
  proxy:
    enable: false                # Proxy rotation (default off, needs proxy pool)
    providers: []                # e.g. ["http://user:pass@proxy1:8080"]
  cookies:
    enable: false                # Cookie pool (default off)

# ===== 4. Three-Level Classification Thresholds =====
classification:
  keyword_score_high: 60
  phrase_score_high: 40
  threshold_pass: 30             # Discard below this score
  title_similarity_min: 0.40     # arXiv verification: trigram Jaccard lower bound
  bert_enabled: true             # Auto-enable when GPU is available

# ===== 5. Hardware Capacity Budget =====
hardware:
  max_pdf_size_mb: 50
  max_pdf_count: 50
  max_md_chars: 500000
  skip_if_no_gpu:
    - "pymupdf4llm"    # Don't install pymupdf4llm without GPU
    - "sentence-transformers"
  auto_downgrade: true

# ===== 6. Budget Configuration (litellm Proxy routing) =====
budget:
  max_tokens: 50000              # Unified token limit for all providers (prevents overruns)
  max_cost_usd: 0.50             # Only applies to paid providers (max $0.50/run)
  # - Ollama etc. local models: in/out=$0, cost check auto-skipped
  # - DeepSeek: input=$0.28/M, output=$0.42/M
  # - Cost limit ≈ DeepSeek one full paper analysis (30K+10K tokens)
  #
  # LiteLLM Proxy routing strategy:
  # 1. Within budget → DeepSeek (high quality)
  # 2. Exceeded/over budget → Fallback to Ollama (free, local inference)
  # See .env for: LITELLM_PROXY, LITELLM_API_KEY

# ===== 7. Wiki Integration Config =====
wiki:
  base_dir: "~/wiki"
  concepts_dir: "concepts"
  entities_dir: "entities"
  index_file: "index.md"
  log_file: "log.md"
  batch_prefix: "hfpapers-"
  write_summary: true

# ===== 8. Output Paths =====
paths:
  data_dir: "data"
  pdf_dir: "pdfs"
  md_dir: "md_extracts"
  log_dir: "logs"
  crawled_db: "crawled.json"
  # Dedup record — absolute path or relative to wiki.base_dir
  global_dedup: "~/wiki/raw/papers/hfpapers-crawled.json"

# ===== 9. Download Pipeline Config =====
db:
  path: "data/arxiv_meta.db"       # arXiv metadata SQLite database

download:
  oai:
    enable: true
    base_url: "https://export.arxiv.org/oai2"
    rate_limit: 2.0                # Request interval (seconds), arXiv recommends >=2s
    batch_write: 500               # Records per batch write to DB
    user_agent: "HFPClawer/0.2.0 (mailto:lishen@example.com)"
    tier1_only: false              # Download all categories by default
  kaggle:
    enable: true                   # Kaggle CLI download of full arXiv dataset
    dataset: "Cornell-University/arxiv"
    jsonl: "data/arxiv_metadata.jsonl"   # Decompressed JSONL file
